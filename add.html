<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>내역 추가 | yy-Pocket</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <header>

            <h1>💰 내역 추가</h1>

        </header>

        <form id="recordForm">

            <div class="form-group">

                <label for="date">날짜</label>

                <input
                    type="date"
                    id="date"
                    required
                >

            </div>

            <div class="form-group">

                <label>종류</label>

                <div class="radio-group">

                    <label>
                        <input
                            type="radio"
                            name="type"
                            value="expense"
                            checked
                        >
                        지출
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="type"
                            value="income"
                        >
                        수입
                    </label>

                </div>

            </div>

            <div class="form-group">

                <label for="category">카테고리</label>

                <select id="category" required>

                </select>

            </div>

            <div class="form-group">

                <label for="amount">금액</label>

                <input
                    type="number"
                    id="amount"
                    placeholder="금액을 입력하세요"
                    min="0"
                    required
                >

            </div>

            <div class="form-group">

                <label for="memo">메모</label>

                <input
                    type="text"
                    id="memo"
                    placeholder="메모(선택)"
                >

            </div>

            <button
                type="submit"
                id="saveBtn"
            >
                저장
            </button>

            <button
                type="button"
                id="cancelBtn"
            >
                취소
            </button>

        </form>

    </div>

    <script type="module" src="add.js"></script>

</body>

</html>
